<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Press Start 2P", monospace;
        background-color: #0f0f0f;
        background-image:
          linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        color: #00ff41;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 48px 16px;
      }

      .container {
        width: 100%;
        max-width: 520px;
      }

      h1 {
        font-size: 1.1rem;
        text-align: center;
        color: #ffe600;
        text-shadow:
          3px 3px 0 #b8a000,
          0 0 16px #ffe60088;
        margin-bottom: 32px;
        letter-spacing: 2px;
      }

      /* Pixel border mixin */
      .pixel-box {
        border: 4px solid #00ff41;
        box-shadow:
          4px 4px 0 #005c18,
          inset -2px -2px 0 #005c18;
        image-rendering: pixelated;
      }

      /* Form */
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      input[type="text"] {
        flex: 1;
        padding: 10px 12px;
        font-family: "Press Start 2P", monospace;
        font-size: 0.55rem;
        background: #0a0a0a;
        color: #00ff41;
        border: 4px solid #00ff41;
        box-shadow: 4px 4px 0 #005c18;
        outline: none;
      }

      input[type="text"]::placeholder {
        color: #005c18;
      }

      input[type="text"]:focus {
        border-color: #ffe600;
        box-shadow: 4px 4px 0 #b8a000;
        color: #ffe600;
      }

      button.btn-add {
        padding: 10px 16px;
        font-family: "Press Start 2P", monospace;
        font-size: 0.55rem;
        background: #00ff41;
        color: #0f0f0f;
        border: 4px solid #00ff41;
        box-shadow: 4px 4px 0 #005c18;
        cursor: pointer;
        white-space: nowrap;
      }

      button.btn-add:hover {
        background: #ffe600;
        border-color: #ffe600;
        box-shadow: 4px 4px 0 #b8a000;
      }

      button.btn-add:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 #005c18;
      }

      /* List */
      ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      li.todo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: #0a0a0a;
        border: 4px solid #00ff41;
        box-shadow: 4px 4px 0 #005c18;
      }

      li.empty {
        text-align: center;
        color: #005c18;
        font-size: 0.5rem;
        padding: 32px;
        border: 4px dashed #005c18;
      }

      /* Toggle button */
      button.btn-toggle {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        background: #0a0a0a;
        border: 3px solid #00ff41;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        color: #00ff41;
        padding: 0;
      }

      button.btn-toggle.done {
        background: #00ff41;
        color: #0f0f0f;
      }

      button.btn-toggle:hover {
        border-color: #ffe600;
        color: #ffe600;
      }

      /* Todo title */
      span.todo-title {
        flex: 1;
        font-size: 0.5rem;
        color: #00ff41;
        word-break: break-word;
        line-height: 1.6;
      }

      span.todo-title.done {
        text-decoration: line-through;
        color: #005c18;
      }

      /* Delete button */
      button.btn-delete {
        flex-shrink: 0;
        background: transparent;
        border: 3px solid transparent;
        cursor: pointer;
        color: #003010;
        font-size: 0.7rem;
        padding: 2px 5px;
        font-family: "Press Start 2P", monospace;
        transition:
          color 0.1s,
          border-color 0.1s;
      }

      li.todo-item:hover button.btn-delete {
        color: #ff4141;
        border-color: #ff4141;
      }

      button.btn-delete:active {
        transform: translate(1px, 1px);
      }

      /* Scanline overlay */
      body::after {
        content: "";
        pointer-events: none;
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>► TO-DO LIST ◄</h1>

      <!-- Add Task Form -->
      <form
        hx-post="/todos"
        hx-target="#todo-list"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()"
      >
        <input
          type="text"
          name="title"
          placeholder="> new task..."
          required
          autocomplete="off"
        />
        <button type="submit" class="btn-add">ADD</button>
      </form>

      <!-- Todo List -->
      <ul id="todo-list">
        {% include "partials/todo_list.html" %}
      </ul>
    </div>
  </body>
</html>
