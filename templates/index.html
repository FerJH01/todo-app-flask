<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 flex items-start justify-center pt-16 px-4"
  >
    <div class="w-full max-w-md">
      <h1
        class="text-3xl font-bold text-center text-indigo-700 mb-8 tracking-tight"
      >
        ✅ To-Do List
      </h1>

      <!-- Add Task Form -->
      <form
        hx-post="/todos"
        hx-target="#todo-list"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()"
        class="flex gap-2 mb-6"
      >
        <input
          type="text"
          name="title"
          placeholder="What needs to be done?"
          required
          autocomplete="off"
          class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white"
        />
        <button
          type="submit"
          class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-semibold shadow hover:bg-indigo-700 active:scale-95 transition-all"
        >
          Add
        </button>
      </form>

      <!-- Todo List -->
      <ul id="todo-list" class="space-y-2">
        {% include "partials/todo_list.html" %}
      </ul>
    </div>
  </body>
</html>
