{% for todo in todos %}
<li class="todo-item">
  <button
    hx-patch="/todos/{{ todo.id }}/toggle"
    hx-target="#todo-list"
    hx-swap="innerHTML"
    class="btn-toggle {% if todo.done %}done{% endif %}"
    title="Toggle complete"
  >
    {% if todo.done %}✓{% endif %}
  </button>
  <span class="todo-title {% if todo.done %}done{% endif %}"
    >{{ todo.title }}</span
  >
  <button
    hx-delete="/todos/{{ todo.id }}"
    hx-target="#todo-list"
    hx-swap="innerHTML"
    hx-confirm="Delete this task?"
    class="btn-delete"
    title="Delete"
  >
    ✕
  </button>
</li>
{% else %}
<li class="empty">[ NO TASKS YET ]</li>
{% endfor %}
